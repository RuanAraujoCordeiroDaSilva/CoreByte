<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreByte - Acessar a Conta</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>

    <div class="login-screen-central">
        <main class="container-box login-container">
            
            <section class="form-wrapper">
                <div class="logo-container">
                    <img src="Corebyte.png" alt="CoreByte Logo" class="corebyte-logo">
                </div>
                
                <h2>Acesse a sua Conta</h2>
                <p class="desc-text">Insira os seus dados para entrar na plataforma.</p>

                <form onsubmit="validarELogar(event)">
                    <div class="field-container">
                        <input type="email" placeholder="E-mail, CPF ou CNPJ" required>
                    </div>
                    
                    <div class="field-container">
                        <input type="password" placeholder="Sua senha" required>
                    </div>

                    <div class="terms-check">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Lembrar de mim neste dispositivo</label>
                    </div>

                    <button type="submit" class="btn-login-verde">ENTRAR</button>
                    <button type="button" class="btn-login-borda" onclick="window.location.href='cadastro.html'">CRIAR CONTA</button>
                </form>
            </section>

            <section class="banner-wrapper">
                <div class="banner-info">
                    <p class="tagline">NIVELADO PARA</p>
                    <h1>VENCER</h1>
                    <div class="neon-line"></div>
                    <p class="sub-desc">Equipamentos de elite para quem não aceita o segundo lugar.</p>
                </div>
            </section>

        </main>
    </div>

    <script>
    function validarELogar(event) {
        event.preventDefault();
        
        // Aqui você pode adicionar futuras validações de login se quiser.
        // Por enquanto, se os campos exigidos (required) estiverem preenchidos, ele entra:
        window.location.href = 'index.html'; 
    }
    </script>
</body>
</html>
