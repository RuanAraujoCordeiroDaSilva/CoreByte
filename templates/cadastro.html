<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreByte - Criar Conta</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

    <div class="cadastro-screen">
        <main class="container-box cadastro-container">
            
            <section class="form-wrapper">
                <div class="logo-container">
                    <img src="Corebyte.png" alt="CoreByte Logo" class="corebyte-logo">
                </div>
                
                <h2>Crie a sua Conta</h2>
                <p class="desc-text">Preencha os campos abaixo para se registrar na plataforma.</p>

                <form onsubmit="validarECadastrar(event)">
                    <div class="field-container">
                        <input type="text" placeholder="Nome completo" required>
                    </div>

                    <div class="field-container">
                        <input type="email" placeholder="Seu e-mail principal" required>
                    </div>
                    
                    <div class="field-container">
                        <input type="password" placeholder="Crie uma senha forte" required>
                    </div>

                    <div class="field-container">
                        <input type="password" placeholder="Confirme a sua senha" required>
                    </div>

                    <div class="terms-check">
                        <input type="checkbox" id="accept-terms" required>
                        <label for="accept-terms">Li e aceito os Termos de Serviço</label>
                    </div>

                    <button type="submit" class="btn-cadastro-verde">CONCLUIR CADASTRO</button>
                    <button type="button" class="btn-cadastro-borda" onclick="window.location.href='login.html'">JÁ TENHO CONTA</button>
                </form>
            </section>

            <section class="banner-wrapper">
                <div class="banner-info">
                    <p class="tagline">NIVELADO PARA</p>
                    <h1>VENCER</h1>
                    <div class="neon-line"></div>
                    <p class="sub-desc">Junte-se à nossa comunidade e monte o setup dos seus sonhos.</p>
                </div>
            </section>

        </main>
    </div>

    <script>
    function validarECadastrar(event) {
    event.preventDefault();
    const inputs = document.querySelectorAll('.field-container input[type="password"]');
    const senha = inputs[0].value;
    const confirmaSenha = inputs[1].value;

    if (senha !== confirmaSenha) {
        alert("As senhas não coincidem! Por favor, verifique.");
        return false;
    }

    // MUDANÇA AQUI: Avisa que deu certo e joga o usuário para a tela de login
    alert("Cadastro concluído com sucesso!");
    window.location.href = 'login.html'; 
}
    </script>
</body>
</html>
